name: Nightly Data Backup

on:
  schedule:
    - cron: '0 3 * * *' # Runs at 03:00 UTC every day
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Backup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/backup-data.ts

      - name: Commit and Push Backup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Only commit if there are changes (avoids failing when no data changed)
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: nightly automated backup [skip ci]" && git push)
